{% extends "layout.html" %}

{% block title %}Сопоставление{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/match_detail.css">
{% endblock %}

{% block content %}
<div class="container py-3">

    <div class="mb-4 d-flex justify-content-between align-items-center">
        <h2 class="fw-bold m-0" style="color: #ffb07c;">Сопоставление</h2>
        <button id="backButton" class="btn btn-outline-custom" onclick="goBack()">← Назад</button>
    </div>

    <div id="matchContainer" class="match-container"></div>

    <div id="actionButtonsContainer" class="text-center mt-4"></div>

</div>
{% endblock %}

{% block extra_js %}
<script>
const matchId = window.location.pathname.split("/").pop();
let currentUser = null;

// Безопасный парсинг JWT токена на фронтенде для определения роли
function parseJwt(token) {
    try {
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    } catch (e) {
        return null;
    }
}

async function loadMatch() {
    const token = localStorage.getItem("token");
    if (!token) {
        window.location.href = "/";
        return;
    }

    const payload = parseJwt(token);
    currentUser = {
        id: payload?.user_id || payload?.sub,
        role: payload?.role || payload?.user_role?.value || payload?.user_role
    };

    // Настраиваем кнопку "Назад" в зависимости от роли
    const backBtn = document.getElementById("backButton");
    if (currentUser.role === "applicant") {
        backBtn.innerText = "← К резюме";
    } else if (currentUser.role === "employer") {
        backBtn.innerText = "← К вакансиям";
    } else {
        backBtn.innerText = "← К сопоставлениям";
    }

    const res = await fetch(`/api/matches/${matchId}`, {
        headers: { "Authorization": "Bearer " + token }
    });

    if (!res.ok) {
        alert("Ошибка загрузки сопоставления");
        return;
    }

    const match = await res.json();
    renderMatch(match);
    renderActions(match);
}

function renderMatch(match) {
    const container = document.getElementById("matchContainer");

    container.innerHTML = `
        <div class="row g-4">

            <div class="col-md-6">
                <div class="match-card h-100">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold m-0" style="color: #ffb07c;">📄 Резюме</h5>
                        ${match.applicant_accepted !== null ?
                            `<span class="badge ${match.applicant_accepted ? 'bg-success' : 'bg-danger'}">
                                ${match.applicant_accepted ? 'Откликнулся' : 'Отказ'}
                            </span>` : '<span class="badge bg-warning text-dark">Ожидает ответа</span>'
                        }
                    </div>
                    ${match.resume ? renderResume(match.resume) : "<p class='text-muted'>Не выбрано</p>"}
                </div>
            </div>

            <div class="col-md-6">
                <div class="match-card h-100">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold m-0" style="color: #ffb07c;">🏢 Вакансия</h5>
                        ${match.employer_accepted !== null ?
                            `<span class="badge ${match.employer_accepted ? 'bg-success' : 'bg-danger'}">
                                ${match.employer_accepted ? 'Принято' : 'Отказ'}
                            </span>` : '<span class="badge bg-warning text-dark">Ожидает ответа</span>'
                        }
                    </div>
                    ${match.vacancy ? renderVacancy(match.vacancy) : "<p class='text-muted'>Не выбрано</p>"}
                </div>
            </div>

        </div>

        <div class="mt-4 text-center">
            <span class="badge py-2 px-3 ${match.is_active ? 'bg-success' : 'bg-secondary'}">
                ${match.is_active ? 'Активно' : 'Завершено'}
            </span>
        </div>
    `;
}

function renderResume(r) {
    return `
        <h6 class="fw-bold text-light mb-2">${r.desired_position}</h6>
        <p class="mb-1">💰 <b>Зарплата:</b> ${r.desired_salary ? r.desired_salary + ' руб.' : "не указана"}</p>
        <p class="mb-3">📊 <b>Опыт:</b> ${r.experience_years} лет</p>
        <p class="mb-2"><strong>🧠 Навыки:</strong></p>
        <p class="text-muted"><span style="white-space: pre-line;">${r.skills ?? "-"}</span></p>
        <p class="mb-2"><strong>🎓 Образование:</strong></p>
        <p class="text-muted"><span style="white-space: pre-line;">${r.education ?? "-"}</span></p>
    `;
}

function renderVacancy(v) {
    return `
        <h6 class="fw-bold text-light mb-2">${v.title}</h6>
        <p class="mb-3">💰 <b>Зарплата:</b> ${v.salary ? v.salary + ' руб.' : "не указана"}</p>
        <p class="mb-2"><strong>📋 Требования:</strong></p>
        <p class="text-muted"><span style="white-space: pre-line;">${v.requirements ?? "-"}</span></p>
        <p class="mb-2"><strong>🛠 Обязанности:</strong></p>
        <p class="text-muted"><span style="white-space: pre-line;">${v.responsibilities ?? "-"}</span></p>
    `;
}

function renderActions(match) {
    const btnContainer = document.getElementById("actionButtonsContainer");
    btnContainer.innerHTML = "";

    if (!match.is_active) {
        btnContainer.innerHTML = `<p class="text-muted">Решение по данному сопоставлению принято. Сделка закрыта.</p>`;
        return;
    }

    // Роль: РЕКРУТЕР
    if (currentUser.role === "recruiter") {
        btnContainer.innerHTML = `
            <button class="btn btn-custom px-4" onclick="notifySides()">
                🚀 Уведомить стороны
            </button>
        `;
    }
    // Роль: СОИСКАТЕЛЬ (Проверяем по роли или по принадлежности к резюме)
    else if (currentUser.role === "applicant" || (match.resume && match.resume.user_id == currentUser.id)) {
        if (match.applicant_accepted !== null) {
            btnContainer.innerHTML = `<p class="text-muted">Вы уже отправили свой отклик. Ожидайте решения второй стороны.</p>`;
            return;
        }
        btnContainer.innerHTML = `
            <button class="btn btn-success px-4 me-2" onclick="sendDecision(true, null)">👍 Откликнуться</button>
            <button class="btn btn-danger px-4" onclick="sendDecision(false, null)">👎 Отказаться</button>
        `;
    }
    // Роль: РАБОТОДАТЕЛЬ (Проверяем по роли или по принадлежности к вакансии)
    else if (currentUser.role === "employer" || (match.vacancy && match.vacancy.employer_id == currentUser.id)) {
        if (match.employer_accepted !== null) {
            btnContainer.innerHTML = `<p class="text-muted">Вы уже отправили свой ответ. Ожидайте решения кандидата.</p>`;
            return;
        }
        btnContainer.innerHTML = `
            <button class="btn btn-success px-4 me-2" onclick="sendDecision(null, true)">✅ Принять</button>
            <button class="btn btn-danger px-4" onclick="sendDecision(null, false)">❌ Отказать</button>
        `;
    }
}

async function sendDecision(applicantAccepted, employerAccepted) {
    const token = localStorage.getItem("token");

    let body = {};
    if (applicantAccepted !== null) body.applicant_accepted = applicantAccepted;
    if (employerAccepted !== null) body.employer_accepted = employerAccepted;

    const res = await fetch(`/api/matches/${matchId}/acceptance`, {
        method: "PATCH",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify(body)
    });

    if (res.ok) {
        alert("Ваш ответ успешно зарегистрирован!");
        loadMatch(); // Перезагружаем интерфейс для пересчета статусов и кнопок
    } else {
        alert("Не удалось сохранить решение.");
    }
}

async function notifySides() {
    const token = localStorage.getItem("token");
    const res = await fetch(`/api/matches/${matchId}/notify`, {
        method: "POST",
        headers: { "Authorization": "Bearer " + token }
    });

    if (res.ok) {
        alert("Уведомления успешно отправлены сторонам!");
    } else {
        const err = await res.json();
        alert(err.detail || "Ошибка уведомления");
    }
}

function goBack() {
    if (currentUser.role === "applicant") {
        window.location.href = "/resumes"; // Или твой эндпоинт списка резюме
    } else if (currentUser.role === "employer") {
        window.location.href = "/vacancies"; // Или твой эндпоинт списка вакансий
    } else {
        window.location.href = "/matches";
    }
}

document.addEventListener("DOMContentLoaded", loadMatch);
</script>
{% endblock %}
