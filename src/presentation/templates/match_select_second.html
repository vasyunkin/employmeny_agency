{% extends "layout.html" %}

{% block title %}Завершение сопоставления{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/match_select_second.css">
{% endblock %}

{% block content %}
<div class="container py-3">

    <div class="mb-4 d-flex justify-content-between align-items-center">
        <h2 class="fw-bold m-0" style="color: #ffb07c;">Выберите второй элемент</h2>
        <button class="btn btn-outline-custom" onclick="location.href='/matches-page'">← Отмена</button>
    </div>

    <div class="row g-4">

        <div class="col-md-5">
            <div id="selectedItem" class="selected-card">
                <div class="text-center text-muted py-4">Загрузка выбранного элемента...</div>
            </div>
        </div>

        <div class="col-md-7">
            <div id="itemsContainer" class="row g-4"></div>

            <div id="emptyMessage" class="text-center mt-5" style="display:none;">
                <h5 class="text-muted">Ничего не найдено</h5>
            </div>
        </div>

    </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
const params = new URLSearchParams(window.location.search);

const matchId = params.get("match_id");
const type = params.get("type"); // что ищем сейчас (resume / vacancy)
const token = localStorage.getItem("token");

if (!token) window.location.href = "/";

let selectedMatch = null;

async function loadMatch() {
    // Добавлен префикс /api
    const res = await fetch(`/api/matches/${matchId}`, {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    if (!res.ok) {
        alert("Ошибка загрузки сопоставления");
        return;
    }

    selectedMatch = await res.json();
    renderSelected();
}

function renderSelected() {
    const container = document.getElementById("selectedItem");

    if (selectedMatch.resume && !selectedMatch.vacancy) {
        const r = selectedMatch.resume;

        container.innerHTML = `
            <h5 class="fw-bold mb-3" style="color: #ffb07c;">Выбрано резюме</h5>
            <h6 class="fw-bold text-light">${r.desired_position}</h6>
            <p class="mb-1">💰 ${r.desired_salary ? r.desired_salary + ' руб.' : "не указана"}</p>
            <p class="mb-3">📊 Опыт: ${r.experience_years} лет</p>

            <hr class="border-secondary">

            <p><strong>Навыки:</strong><br><span style="white-space: pre-line;">${r.skills ?? "-"}</span></p>
            <p><strong>Образование:</strong><br><span style="white-space: pre-line;">${r.education ?? "-"}</span></p>
        `;
    }

    if (selectedMatch.vacancy && !selectedMatch.resume) {
        const v = selectedMatch.vacancy;

        container.innerHTML = `
            <h5 class="fw-bold mb-3" style="color: #ffb07c;">Выбрана вакансия</h5>
            <h6 class="fw-bold text-light">${v.title}</h6>
            <p class="mb-3">💰 ${v.salary ? v.salary + ' руб.' : "не указана"}</p>

            <hr class="border-secondary">

            <p><strong>Требования:</strong><br><span style="white-space: pre-line;">${v.requirements ?? "-"}</span></p>
            <p><strong>Обязанности:</strong><br><span style="white-space: pre-line;">${v.responsibilities ?? "-"}</span></p>
        `;
    }
}

async function loadItems() {
    let url = "";

    if (type === "resume") {
        url = "/api/resumes/search/"; // Добавлен префикс /api
    } else if (type === "vacancy") {
        url = "/api/vacancies/search/"; // Добавлен префикс /api
    } else {
        return;
    }

    // Добавлена авторизация токеном для поиска элементов
    const res = await fetch(url, {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const container = document.getElementById("itemsContainer");
    const emptyMessage = document.getElementById("emptyMessage");

    if (!res.ok) {
        emptyMessage.style.display = "block";
        return;
    }

    const items = await res.json();

    if (!items || items.length === 0) {
        emptyMessage.style.display = "block";
        return;
    }

    emptyMessage.style.display = "none";
    container.innerHTML = "";

    items.forEach(item => {
        const card = document.createElement("div");
        card.className = "col-md-6";
        card.innerHTML = renderCard(item);
        container.appendChild(card);
    });
}

function renderCard(item) {
    if (type === "resume") {
        return `
            <div class="match-card">
                <h5 class="fw-bold text-light">${item.desired_position}</h5>
                <p class="mb-1">💰 ${item.desired_salary ? item.desired_salary + ' руб.' : "не указана"}</p>
                <p class="mb-3">📊 Опыт: ${item.experience_years} лет</p>

                <div class="details" style="display:none;">
                    <hr class="border-secondary">
                    <p><strong>Навыки:</strong><br><span style="white-space: pre-line;">${item.skills ?? "-"}</span></p>
                    <p><strong>Образование:</strong><br><span style="white-space: pre-line;">${item.education ?? "-"}</span></p>
                </div>

                <button class="btn btn-outline-custom w-100 mb-2" onclick="toggleDetails(this)">
                    Подробнее
                </button>

                <button class="btn btn-custom w-100" onclick="completeMatch(${item.resume_id})">
                    Добавить в сопоставление
                </button>
            </div>
        `;
    }

    if (type === "vacancy") {
        return `
            <div class="match-card">
                <h5 class="fw-bold text-light">${item.title}</h5>
                <p class="mb-3">💰 ${item.salary ? item.salary + ' руб.' : "не указана"}</p>

                <div class="details" style="display:none;">
                    <hr class="border-secondary">
                    <p><strong>Требования:</strong><br><span style="white-space: pre-line;">${item.requirements ?? "-"}</span></p>
                    <p><strong>Обязанности:</strong><br><span style="white-space: pre-line;">${item.responsibilities ?? "-"}</span></p>
                </div>

                <button class="btn btn-outline-custom w-100 mb-2" onclick="toggleDetails(this)">
                    Подробнее
                </button>

                <button class="btn btn-custom w-100" onclick="completeMatch(${item.vacancy_id})">
                    Добавить в сопоставление
                </button>
            </div>
        `;
    }
}

function toggleDetails(btn) {
    const details = btn.previousElementSibling;
    const isHidden = details.style.display === "none";

    details.style.display = isHidden ? "block" : "none";
    btn.innerText = isHidden ? "Скрыть" : "Подробнее";
}

async function completeMatch(id) {
    let body = {};

    if (type === "resume") {
        body = { resume_id: id };
    } else {
        body = { vacancy_id: id };
    }

    // Добавлен префикс /api к PATCH-запросу
    const res = await fetch(`/api/matches/${matchId}/acceptance`, {
        method: "PATCH",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify(body)
    });

    if (!res.ok) {
        alert("Ошибка завершения сопоставления");
        return;
    }

    // Редирект на красивую HTML-страницу деталей сопоставления
    window.location.href = `/matches/${matchId}`;
}

document.addEventListener("DOMContentLoaded", async () => {
    await loadMatch();
    await loadItems();
});
</script>
{% endblock %}
