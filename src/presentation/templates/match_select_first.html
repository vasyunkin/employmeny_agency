{% extends "layout.html" %}

{% block title %}Выбор для сопоставления{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/match_select.css">
{% endblock %}

{% block content %}
<div class="container py-3">

    <div class="mb-4 d-flex justify-content-between align-items-center">
        <h2 class="fw-bold m-0" id="pageTitle">Выберите элемент для сопоставления</h2>
        <button class="btn btn-outline-custom" onclick="location.href='/matches'">← Отмена</button>
    </div>

    <div id="itemsContainer" class="row g-4"></div>

    <div id="emptyMessage" class="text-center mt-5" style="display:none;">
        <h5 class="text-muted">Ничего не найдено</h5>
    </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
const params = new URLSearchParams(window.location.search);
const type = params.get("type"); // resume или vacancy
const token = localStorage.getItem("token");

if (!token) window.location.href = "/";

async function loadItems() {
    const container = document.getElementById("itemsContainer");
    const emptyMessage = document.getElementById("emptyMessage");
    const pageTitle = document.getElementById("pageTitle");

    let url = "";

    if (type === "resume") {
        pageTitle.innerText = "Выберите резюме для сопоставления";
        url = "/api/resumes/search/"; // Добавлен префикс /api
    } else if (type === "vacancy") {
        pageTitle.innerText = "Выберите вакансию для сопоставления";
        url = "/api/vacancies/search/"; // Добавлен префикс /api
    } else {
        emptyMessage.style.display = "block";
        return;
    }

    // Делаем запрос с передачей токена авторизации
    const res = await fetch(url, {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    if (!res.ok) {
        emptyMessage.style.display = "block";
        return;
    }

    const items = await res.json();

    if (!items || items.length === 0) {
        emptyMessage.style.display = "block";
        return;
    }

    emptyMessage.style.display = "none";
    container.innerHTML = "";

    items.forEach(item => {
        const card = document.createElement("div");
        card.className = "col-md-6";
        card.innerHTML = renderCard(item);
        container.appendChild(card);
    });
}

function renderCard(item) {
    if (type === "resume") {
        return `
            <div class="match-card">
                <h5 class="fw-bold" style="color: #ffb07c;">${item.desired_position}</h5>
                <p>💰 ${item.desired_salary ? item.desired_salary + ' руб.' : "не указана"}</p>
                <p>📊 Опыт: ${item.experience_years} лет</p>

                <div class="details" style="display:none;">
                    <hr class="border-secondary">
                    <p><strong>Навыки:</strong><br><span style="white-space: pre-line;">${item.skills ?? "-"}</span></p>
                    <p><strong>Образование:</strong><br><span style="white-space: pre-line;">${item.education ?? "-"}</span></p>
                </div>

                <button class="btn btn-outline-custom w-100 mb-2" onclick="toggleDetails(this)">
                    Подробнее
                </button>

                <button class="btn btn-custom w-100" onclick="selectItem(${item.resume_id})">
                    Добавить в сопоставление
                </button>
            </div>
        `;
    }

    if (type === "vacancy") {
        return `
            <div class="match-card">
                <h5 class="fw-bold" style="color: #ffb07c;">${item.title}</h5>
                <p>💰 ${item.salary ? item.salary + ' руб.' : "не указана"}</p>

                <div class="details" style="display:none;">
                    <hr class="border-secondary">
                    <p><strong>Требования:</strong><br><span style="white-space: pre-line;">${item.requirements ?? "-"}</span></p>
                    <p><strong>Обязанности:</strong><br><span style="white-space: pre-line;">${item.responsibilities ?? "-"}</span></p>
                </div>

                <button class="btn btn-outline-custom w-100 mb-2" onclick="toggleDetails(this)">
                    Подробнее
                </button>

                <button class="btn btn-custom w-100" onclick="selectItem(${item.vacancy_id})">
                    Добавить в сопоставление
                </button>
            </div>
        `;
    }
}

function toggleDetails(btn) {
    const details = btn.previousElementSibling;
    const isHidden = details.style.display === "none";

    details.style.display = isHidden ? "block" : "none";
    btn.innerText = isHidden ? "Скрыть" : "Подробнее";
}

async function selectItem(id) {
    let body = {};

    if (type === "resume") {
        body = { resume_id: id, vacancy_id: null };
    } else {
        body = { resume_id: null, vacancy_id: id };
    }

    // Обновлен роут создания сопоставления на /api/matches
    const res = await fetch("/api/matches", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify(body)
    });

    if (!res.ok) {
        alert("Ошибка создания сопоставления");
        return;
    }

    const data = await res.json();

    // Переходим на выбор второго элемента
    if (type === "resume") {
        window.location.href = `/match-select-second?match_id=${data.match_id}&type=vacancy`;
    } else {
        window.location.href = `/match-select-second?match_id=${data.match_id}&type=resume`;
    }
}

document.addEventListener("DOMContentLoaded", loadItems);
</script>
{% endblock %}
