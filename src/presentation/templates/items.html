{% extends "layout.html" %}

{% block title %}Мои данные{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/items.css">
{% endblock %}

{% block content %}
<div class="container py-3">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 id="pageTitle" class="fw-bold m-0"></h2>
        <button id="createBtn" class="btn btn-custom" onclick="createItem()"></button>
    </div>

    <div id="emptyMessage" class="text-center mt-5" style="display:none;">
        <h5 class="text-muted">Упс, пока здесь ничего нет</h5>
    </div>

    <div id="itemsContainer" class="row g-4"></div>

</div>
{% endblock %}

{% block extra_js %}
<script>
const token = localStorage.getItem("token");
if (!token) window.location.href = "/";

const payload = JSON.parse(atob(token.split('.')[1]));

let config = {};

function resolveConfig() {
    if (payload.role === "applicant") {
        config = {
            title: "Мои резюме",
            endpoint: "/api/resumes", // Добавлен префикс /api
            createText: "Создать резюме",
            createUrl: "/create/resume",
            render: renderResume
        };
    } else if (payload.role === "employer") {
        config = {
            title: "Мои вакансии",
            endpoint: "/api/vacancies", // Добавлен префикс /api
            createText: "Создать вакансию",
            createUrl: "/create/vacancy",
            render: renderVacancy
        };
    } else {
        config = {
            title: "Мои сопоставления",
            endpoint: "/api/matches", // Добавлен префикс /api
            createText: "",
            createUrl: null,
            render: renderMatch
        };
    }

    document.getElementById("pageTitle").innerText = config.title;

    const createBtn = document.getElementById("createBtn");
    createBtn.innerText = config.createText;
    if (!config.createUrl) createBtn.style.display = "none";
}

async function loadItems() {
    const res = await fetch(config.endpoint, {
        headers: { "Authorization": "Bearer " + token }
    });

    const container = document.getElementById("itemsContainer");
    const empty = document.getElementById("emptyMessage");

    container.innerHTML = "";

    if (!res.ok) {
        empty.style.display = "block";
        return;
    }

    const data = await res.json();

    if (data.length === 0) {
        empty.style.display = "block";
        return;
    }

    empty.style.display = "none";

    data.forEach(item => {
        container.appendChild(config.render(item));
    });
}

function baseCard(content) {
    const col = document.createElement("div");
    col.className = "col-md-6";
    col.innerHTML = `<div class="item-card">${content}</div>`;
    return col;
}

/* ===== RENDERERS ===== */
function renderResume(r) {
    return baseCard(`
        <h5 class="fw-bold mb-2">${r.desired_position}</h5>
        <p class="mb-1">💰 Зарплата: ${r.desired_salary ?? "не указана"}</p>
        <p class="mb-3">📊 Опыт: ${r.experience_years} лет</p>
        <button class="btn btn-outline-custom w-100" onclick="openItem('/resumes/${r.resume_id}')">
            Подробнее
        </button>
    `);
}

function renderVacancy(v) {
    return baseCard(`
        <h5 class="fw-bold mb-2">${v.title}</h5>
        <p class="mb-1">💰 Зарплата: ${v.salary ?? "не указана"}</p>
        <p class="mb-3">📄 Требования: ${v.requirements ?? "-"}</p>
        <button class="btn btn-outline-custom w-100" onclick="openItem('/vacancies/${v.vacancy_id}')">
            Подробнее
        </button>
    `);
}

function renderMatch(m) {
    return baseCard(`
        <h5 class="fw-bold mb-2">Сопоставление #${m.match_id}</h5>
        <p class="mb-1">📄 ID Резюме: ${m.resume_id}</p>
        <p class="mb-1">🏢 ID Вакансии: ${m.vacancy_id}</p>
        <p class="mb-3">📊 Активен: ${m.is_active ? "Да" : "Нет"}</p>
        <button class="btn btn-outline-custom w-100" onclick="openItem('/matches/${m.match_id}')">
            Подробнее
        </button>
    `);
}

function openItem(url) {
    window.location.href = url;
}

function createItem() {
    if (config.createUrl) window.location.href = config.createUrl;
}

document.addEventListener("DOMContentLoaded", () => {
    resolveConfig();
    loadItems();
});
</script>
{% endblock %}
