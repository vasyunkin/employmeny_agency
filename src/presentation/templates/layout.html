<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}App{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/layout.css">

    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar px-4">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/">
            Employment
        </a>

        <div class="d-flex align-items-center gap-3">

            <button class="btn btn-outline-custom" data-bs-toggle="offcanvas" data-bs-target="#notificationsPanel">
                🔔 <span id="notificationBadge" class="badge bg-danger" style="display: none;"></span>
            </button>

            <button class="btn btn-outline-custom" onclick="logout()">
                Выйти
            </button>

        </div>
    </div>
</nav>

<div class="page-content">
    {% block content %}{% endblock %}
</div>

<div class="offcanvas offcanvas-end custom-offcanvas" tabindex="-1" id="notificationsPanel">
    <div class="offcanvas-header">
        <h5 class="fw-bold text-light">Уведомления</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">

        <button class="btn btn-custom w-100 mb-3" onclick="markAllRead()">
            Прочитать все
        </button>

        <div id="notificationsList"></div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function loadNotifications() {
    const token = localStorage.getItem("token");
    if (!token) return;

    const res = await fetch("/api/notifications", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const container = document.getElementById("notificationsList");
    const badge = document.getElementById("notificationBadge");
    container.innerHTML = "";

    if (!res.ok) return;

    const data = await res.json();

    const items = data.items || [];

    const unreadCount = items.filter(n => !n.is_read).length;
    if (unreadCount > 0) {
        badge.innerText = unreadCount;
        badge.style.display = "inline-block";
    } else {
        badge.style.display = "none";
    }

    if (items.length === 0) {
        container.innerHTML = "<p class='text-muted text-center mt-3'>Нет уведомлений</p>";
        return;
    }

    items.forEach(n => {
        const item = document.createElement("div");
        item.className = `notification-item p-3 mb-2 rounded ${n.is_read ? 'opacity-50' : 'bg-dark border-start border-custom border-3'}`;

        const matchId = n.match_id || null;

        item.innerHTML = `
            <div class="mb-1 fw-bold text-custom" style="color: #ffb07c;">${n.notification_type}</div>
            <div class="mb-3 text-light small">${n.message}</div>

            <div class="d-flex justify-content-between align-items-center">
                ${matchId ? `
                    <button class="btn btn-sm btn-outline-custom" onclick="goToNotification(${matchId})">
                        Перейти к сопоставлению
                    </button>
                ` : '<span class="text-muted small">Системное</span>'}

                ${!n.is_read ? `
                    <button class="btn btn-sm btn-custom py-0 px-2" onclick="markRead(${n.notification_id})">
                        ✓
                    </button>
                ` : ''}
            </div>
        `;

        container.appendChild(item);
    });
}

async function markRead(id) {
    const token = localStorage.getItem("token");

    await fetch(`/api/notifications/${id}/read`, {
        method: "PATCH",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    loadNotifications();
}

async function markAllRead() {
    const token = localStorage.getItem("token");

    await fetch(`/api/notifications/read-all`, {
        method: "PATCH",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    loadNotifications();
}

function goToNotification(matchId) {
    if (matchId) {
        window.location.href = `/matches/${matchId}`;
    } else {
        alert("Ссылка недоступна");
    }
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "/";
}

document.addEventListener("DOMContentLoaded", loadNotifications);
setInterval(loadNotifications, 30000);
</script>

{% block extra_js %}{% endblock %}

</body>
</html>
