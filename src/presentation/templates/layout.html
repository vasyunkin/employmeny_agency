<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}App{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/layout.css">

    {% block extra_css %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-navbar px-4">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/">
            Employment
        </a>

        <div class="d-flex align-items-center gap-3">

            <button class="btn btn-outline-custom" data-bs-toggle="offcanvas" data-bs-target="#notificationsPanel">
                🔔
            </button>

            <button class="btn btn-outline-custom" onclick="logout()">
                Выйти
            </button>

        </div>
    </div>
</nav>

<div class="page-content">
    {% block content %}{% endblock %}
</div>

<div class="offcanvas offcanvas-end custom-offcanvas" tabindex="-1" id="notificationsPanel">
    <div class="offcanvas-header">
        <h5 class="fw-bold">Уведомления</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">

        <button class="btn btn-custom w-100 mb-3" onclick="markAllRead()">
            Прочитать все
        </button>

        <div id="notificationsList"></div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function loadNotifications() {
    const token = localStorage.getItem("token");

    const res = await fetch("/notifications", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const container = document.getElementById("notificationsList");
    container.innerHTML = "";

    if (!res.ok) return;

    const data = await res.json();

    if (data.length === 0) {
        container.innerHTML = "<p class='text-muted'>Нет уведомлений</p>";
        return;
    }

    data.forEach(n => {
        const item = document.createElement("div");
        item.className = "notification-item";

        item.innerHTML = `
            <div class="mb-2 fw-semibold">${n.notification_type}</div>
            <div class="mb-3">${n.message}</div>

            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-custom" onclick="goToNotification()">
                    Перейти
                </button>
                <button class="btn btn-sm btn-outline-custom" onclick="markRead(${n.notification_id})">
                    ✓
                </button>
            </div>
        `;

        container.appendChild(item);
    });
}

async function markRead(id) {
    const token = localStorage.getItem("token");

    await fetch(`/notifications/${id}/read`, {
        method: "PATCH",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    loadNotifications();
}

async function markAllRead() {
    const token = localStorage.getItem("token");

    await fetch(`/notifications/read-all`, {
        method: "PATCH",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    loadNotifications();
}

function goToNotification() {
    alert("Навигация будет добавлена позже");
}

function logout() {
    localStorage.removeItem("token");
    window.location.href = "/";
}

document.addEventListener("DOMContentLoaded", loadNotifications);
</script>

{% block extra_js %}{% endblock %}

</body>
</html>
