<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>

<div class="auth-container">
    <div class="form-box">

        <div class="d-flex justify-content-around mb-4">
            <button id="btnToggleLogin" class="toggle-btn active" onclick="showLogin()">Вход</button>
            <button id="btnToggleRegister" class="toggle-btn" onclick="showRegister()">Регистрация</button>
        </div>

        <form id="loginForm">
            <h3 class="text-center mb-4 fw-bold">Войти в аккаунт</h3>
            <div class="mb-3">
                <input type="text" class="form-control" id="login_login" placeholder="Логин" required>
            </div>
            <div class="mb-4">
                <input type="password" class="form-control" id="login_password" placeholder="Пароль" required>
            </div>
            <button type="submit" class="btn btn-custom w-100">Войти</button>
            <p id="login_error" class="error-message"></p>
        </form>

        <form id="registerForm" style="display:none;">
            <h3 class="text-center mb-4 fw-bold">Создать аккаунт</h3>
            <div class="mb-3">
                <input type="text" class="form-control" id="reg_login" placeholder="Логин" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" id="reg_password" placeholder="Пароль" required>
            </div>
            <div class="mb-3">
                <input type="text" class="form-control" id="first_name" placeholder="Имя" required>
            </div>
            <div class="mb-3">
                <input type="text" class="form-control" id="last_name" placeholder="Фамилия" required>
            </div>
            <div class="mb-4">
                <select class="form-select" id="role">
                    <option value="applicant">Соискатель</option>
                    <option value="employer">Работодатель</option>
                </select>
            </div>
            <button type="submit" class="btn btn-custom w-100">Зарегистрироваться</button>
            <p id="register_error" class="error-message"></p>
        </form>

    </div>
</div>

<script>
function showLogin() {
    document.getElementById("loginForm").style.display = "block";
    document.getElementById("registerForm").style.display = "none";
    document.getElementById("btnToggleLogin").classList.add("active");
    document.getElementById("btnToggleRegister").classList.remove("active");
}

function showRegister() {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerForm").style.display = "block";
    document.getElementById("btnToggleLogin").classList.remove("active");
    document.getElementById("btnToggleRegister").classList.add("active");
}

document.getElementById("loginForm").onsubmit = async (e) => {
    e.preventDefault();
    document.getElementById("login_error").innerText = "";

    const res = await fetch("/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            user_login: document.getElementById("login_login").value,
            password: document.getElementById("login_password").value
        })
    });

    if (!res.ok) {
        document.getElementById("login_error").innerText = "Неверный логин или пароль";
        return;
    }

    const data = await res.json();
    localStorage.setItem("token", data.access_token);

    const payload = JSON.parse(atob(data.access_token.split('.')[1]));

    if (payload.role === "applicant") {
        window.location.href = "/resumes-page";
    } else if (payload.role === "employer") {
        window.location.href = "/vacancies-page";
    } else {
        window.location.href = "/matches-page";
    }
};

document.getElementById("registerForm").onsubmit = async (e) => {
    e.preventDefault();
    document.getElementById("register_error").innerText = "";

    const res = await fetch("/auth/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            user_login: document.getElementById("reg_login").value,
            password: document.getElementById("reg_password").value,
            first_name: document.getElementById("first_name").value,
            last_name: document.getElementById("last_name").value,
            user_role: document.getElementById("role").value
        })
    });

    if (!res.ok) {
        document.getElementById("register_error").innerText = "Пользователь с таким логином уже существует";
        return;
    }

    const data = await res.json();
    localStorage.setItem("token", data.access_token);

    window.location.href = "/";
};
</script>

</body>
</html>
