<!DOCTYPE html>

<html>
<head>
    <meta charset="UTF-8">
    <title>Auth</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>

<div class="container">
    <div class="form-box">
        <div class="toggle">
            <button onclick="showLogin()">Вход</button>
            <button onclick="showRegister()">Регистрация</button>
        </div>

```
    <form id="loginForm">
        <h2>Login</h2>
        <input type="text" id="login_login" placeholder="Логин" required>
        <input type="password" id="login_password" placeholder="Пароль" required>
        <button type="submit">Войти</button>
        <p id="login_error" class="error"></p>
    </form>

    <form id="registerForm" style="display:none;">
        <h2>Register</h2>
        <input type="text" id="reg_login" placeholder="Логин" required>
        <input type="password" id="reg_password" placeholder="Пароль" required>
        <input type="text" id="first_name" placeholder="Имя" required>
        <input type="text" id="last_name" placeholder="Фамилия" required>

        <select id="role">
            <option value="applicant">Соискатель</option>
            <option value="employer">Работодатель</option>
        </select>

        <button type="submit">Регистрация</button>
        <p id="register_error" class="error"></p>
    </form>
</div>
```

</div>

<script>
function showLogin() {
    document.getElementById("loginForm").style.display = "block";
    document.getElementById("registerForm").style.display = "none";
}

function showRegister() {
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerForm").style.display = "block";
}

document.getElementById("loginForm").onsubmit = async (e) => {
    e.preventDefault();

    const res = await fetch("/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            user_login: document.getElementById("login_login").value,
            password: document.getElementById("login_password").value
        })
    });

    if (!res.ok) {
        document.getElementById("login_error").innerText = "Invalid credentials";
        return;
    }

    const data = await res.json();
    localStorage.setItem("token", data.access_token);

    const payload = JSON.parse(atob(data.access_token.split('.')[1]));

    if (payload.role === "applicant") {
        window.location.href = "/resumes-page";
    } else if (payload.role === "employer") {
        window.location.href = "/vacancies-page";
    } else {
        window.location.href = "/matches-page";
    }
};

document.getElementById("registerForm").onsubmit = async (e) => {
    e.preventDefault();

    const res = await fetch("/auth/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            user_login: document.getElementById("reg_login").value,
            password: document.getElementById("reg_password").value,
            first_name: document.getElementById("first_name").value,
            last_name: document.getElementById("last_name").value,
            user_role: document.getElementById("role").value
        })
    });

    if (!res.ok) {
        document.getElementById("register_error").innerText = "User already exists";
        return;
    }

    const data = await res.json();
    localStorage.setItem("token", data.access_token);

    window.location.href = "/";
};
</script>

</body>
</html>
